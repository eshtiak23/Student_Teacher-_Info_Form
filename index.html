<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Information Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="form-card">
      <h1 class="title">Personal Information Form</h1>

      <div class="section-title">General Info</div>
      <hr class="section-line" />

      <div id="statusBox" class="status-box hidden">
        <p id="statusText">Ready</p>
      </div>

      <div class="type-switch">
        <label class="type-option active" id="studentOption">
          <input type="radio" name="personType" value="student" checked />
          <span class="type-icon">🎓</span>
          <span>Student Registration</span>
        </label>

        <label class="type-option" id="teacherOption">
          <input type="radio" name="personType" value="teacher" />
          <span class="type-icon">👨‍🏫</span>
          <span>Teacher Registration</span>
        </label>
      </div>

      <form id="infoForm" novalidate>
        <div id="studentFields" class="form-grid">
          <div class="field">
            <label for="studentRoll">Student Roll</label>
            <input type="text" id="studentRoll" placeholder="Enter student roll" required />
          </div>

          <div class="field">
            <label for="studentName">Full Name</label>
            <input type="text" id="studentName" placeholder="Enter full name" required />
          </div>

          <div class="field-full">
            <label>Gender</label>
            <div class="choice-group">
              <label class="choice-box"><input type="radio" name="studentGender" value="Male" required /> Male</label>
              <label class="choice-box"><input type="radio" name="studentGender" value="Female" required /> Female</label>
            </div>
          </div>

          <div class="field">
            <label for="studentDepartment">Department</label>
            <select id="studentDepartment" required>
              <option value="">Select department</option>
              <option>CST</option>
              <option>ET</option>
              <option>MT</option>
              <option>CT</option>
              <option>EMT</option>
              <option>PT</option>
              <option>MeC</option>
              <option>Other</option>
            </select>
          </div>

          <div class="field">
            <label for="studentSemester">Semester</label>
            <select id="studentSemester" required>
              <option value="">Select semester</option>
              <option>1st</option>
              <option>2nd</option>
              <option>3rd</option>
              <option>4th</option>
              <option>5th</option>
              <option>6th</option>
              <option>7th</option>
              <option>8th</option>
            </select>
          </div>

          <div class="field">
            <label for="studentShift">Shift</label>
            <select id="studentShift" required>
              <option value="">Select shift</option>
              <option>Day</option>
              <option>Morning</option>
            </select>
          </div>

          <div class="field">
            <label for="studentSession">Session</label>
            <select id="studentSession" required>
              <option value="">Select session</option>
              <option>21-22</option>
              <option>22-23</option>
              <option>23-24</option>
              <option>25-26</option>
            </select>
          </div>

          <div class="field">
            <label for="studentPhone">Phone Number</label>
            <input type="tel" id="studentPhone" placeholder="Enter phone number" required />
          </div>

          <div class="field">
            <label for="studentEmail">Email</label>
            <input type="email" id="studentEmail" placeholder="Enter email address" required />
          </div>

          <div class="field-full">
            <label for="studentAddress">Address</label>
            <textarea id="studentAddress" placeholder="Enter address" required></textarea>
          </div>

          <div class="field">
            <label for="studentBlood">Blood Group</label>
            <select id="studentBlood" required>
              <option value="">Select blood group</option>
              <option>A+</option>
              <option>A-</option>
              <option>B+</option>
              <option>B-</option>
              <option>AB+</option>
              <option>AB-</option>
              <option>O+</option>
              <option>O-</option>
            </select>
          </div>

          <div class="field">
            <label for="studentDob">Date Of Birth</label>
            <input type="date" id="studentDob" required />
          </div>

          <div class="field">
            <label for="guardianName">Guardian Name</label>
            <input type="text" id="guardianName" placeholder="Enter guardian name" required />
          </div>

          <div class="field">
            <label for="guardianPhone">Guardian Phone</label>
            <input type="tel" id="guardianPhone" placeholder="Enter guardian phone" required />
          </div>

          <div class="field-full">
            <label for="studentPhoto">Photo Upload</label>
            <input type="file" id="studentPhoto" accept="image/*" />
          </div>

          <div class="field">
            <label for="studentFacebook">Facebook Link <small>(Optional)</small></label>
            <input type="url" id="studentFacebook" placeholder="https://facebook.com/..." />
          </div>

          <div class="field">
            <label for="studentLinkedin">LinkedIn Link <small>(Optional)</small></label>
            <input type="url" id="studentLinkedin" placeholder="https://linkedin.com/in/..." />
          </div>
        </div>

        <div id="teacherFields" class="form-grid hidden">
          <div class="field">
            <label for="teacherName">Name</label>
            <input type="text" id="teacherName" placeholder="Enter teacher name" />
          </div>

          <div class="field">
            <label for="teacherPosition">Position</label>
            <select id="teacherPosition">
              <option value="">Select position</option>
              <option>Instructor</option>
              <option>Junior Instructor</option>
              <option>Lab Assistant</option>
            </select>
          </div>

          <div class="field-full">
            <label>Gender</label>
            <div class="choice-group">
              <label class="choice-box"><input type="radio" name="teacherGender" value="Male" /> Male</label>
              <label class="choice-box"><input type="radio" name="teacherGender" value="Female" /> Female</label>
            </div>
          </div>

          <div class="field">
            <label for="teacherBlood">Blood Group</label>
            <select id="teacherBlood">
              <option value="">Select blood group</option>
              <option>A+</option>
              <option>A-</option>
              <option>B+</option>
              <option>B-</option>
              <option>AB+</option>
              <option>AB-</option>
              <option>O+</option>
              <option>O-</option>
            </select>
          </div>

          <div class="field">
            <label for="teacherShift">Shift</label>
            <select id="teacherShift">
              <option value="">Select shift</option>
              <option>Day</option>
              <option>Morning</option>
            </select>
          </div>

          <div class="field-full">
            <label for="teacherAddress">Address</label>
            <textarea id="teacherAddress" placeholder="Enter address"></textarea>
          </div>

          <div class="field">
            <label for="teacherPhone">Phone Number</label>
            <input type="tel" id="teacherPhone" placeholder="Enter phone number" />
          </div>

          <div class="field-full">
            <label for="teacherPhoto">Photo Upload</label>
            <input type="file" id="teacherPhoto" accept="image/*" />
          </div>

          <div class="field">
            <label for="teacherFacebook">Facebook Link <small>(Optional)</small></label>
            <input type="url" id="teacherFacebook" placeholder="https://facebook.com/..." />
          </div>

          <div class="field">
            <label for="teacherLinkedin">LinkedIn Link <small>(Optional)</small></label>
            <input type="url" id="teacherLinkedin" placeholder="https://linkedin.com/in/..." />
          </div>
        </div>

        <div class="actions">
          <button type="submit">Submit</button>
          <button type="button" class="secondary" id="resetBtn">Reset</button>
        </div>

        <div class="footer-note">Supabase Connected Form</div>
      </form>
    </div>

    <div class="landscape">
      <div class="hill hill-1"></div>
      <div class="hill hill-2"></div>
      <div class="hill hill-3"></div>
      <div class="path"></div>
      <div class="candy left"></div>
      <div class="candy right"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://cdeulhheleboruiffbtg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZXVsaGhlbGVib3J1aWZmYnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzc3MTcsImV4cCI6MjA5MTk1MzcxN30.5_dNfxHPSKP86kYXQLmTmcjQu_YQT2zu9ScLJ_Lwn5E';
    const PHOTO_BUCKET = 'student-teacher-photos';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const studentOption = document.getElementById('studentOption');
    const teacherOption = document.getElementById('teacherOption');
    const studentRadio = document.querySelector('input[name="personType"][value="student"]');
    const teacherRadio = document.querySelector('input[name="personType"][value="teacher"]');
    const studentFields = document.getElementById('studentFields');
    const teacherFields = document.getElementById('teacherFields');
    const form = document.getElementById('infoForm');
    const resetBtn = document.getElementById('resetBtn');
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');

    const studentRequiredFields = [
      document.getElementById('studentRoll'),
      document.getElementById('studentName'),
      document.getElementById('studentDepartment'),
      document.getElementById('studentSemester'),
      document.getElementById('studentShift'),
      document.getElementById('studentSession'),
      document.getElementById('studentPhone'),
      document.getElementById('studentEmail'),
      document.getElementById('studentAddress'),
      document.getElementById('studentBlood'),
      document.getElementById('studentDob'),
      document.getElementById('guardianName'),
      document.getElementById('guardianPhone')
    ];

    const teacherRequiredFields = [
      document.getElementById('teacherName'),
      document.getElementById('teacherPosition'),
      document.getElementById('teacherBlood'),
      document.getElementById('teacherShift'),
      document.getElementById('teacherAddress'),
      document.getElementById('teacherPhone')
    ];

    const studentGenderInputs = document.querySelectorAll('input[name="studentGender"]');
    const teacherGenderInputs = document.querySelectorAll('input[name="teacherGender"]');

    function showStatus(message, type = '') {
      statusBox.classList.remove('hidden');
      statusText.textContent = message;
      statusText.className = type;
      console.log(message);
    }

    function setRequired(fields, shouldRequire) {
      fields.forEach((field) => {
        if (field) {
          field.required = shouldRequire;
        }
      });
    }

    function setGenderRequired(inputs, shouldRequire) {
      inputs.forEach((input) => {
        input.required = shouldRequire;
      });
    }

    function toggleForm(type) {
      if (type === 'teacher') {
        teacherFields.classList.remove('hidden');
        studentFields.classList.add('hidden');
        teacherOption.classList.add('active');
        studentOption.classList.remove('active');
        teacherRadio.checked = true;

        setRequired(studentRequiredFields, false);
        setGenderRequired(studentGenderInputs, false);
        setRequired(teacherRequiredFields, true);
        setGenderRequired(teacherGenderInputs, true);
      } else {
        studentFields.classList.remove('hidden');
        teacherFields.classList.add('hidden');
        studentOption.classList.add('active');
        teacherOption.classList.remove('active');
        studentRadio.checked = true;

        setRequired(studentRequiredFields, true);
        setGenderRequired(studentGenderInputs, true);
        setRequired(teacherRequiredFields, false);
        setGenderRequired(teacherGenderInputs, false);
      }
    }

    studentOption.addEventListener('click', function () {
      toggleForm('student');
    });

    teacherOption.addEventListener('click', function () {
      toggleForm('teacher');
    });

    studentRadio.addEventListener('change', function () {
      toggleForm('student');
    });

    teacherRadio.addEventListener('change', function () {
      toggleForm('teacher');
    });

    function getSelectedRadioValue(name) {
      const selected = document.querySelector(`input[name="${name}"]:checked`);
      return selected ? selected.value : null;
    }

    function resetToStudentForm() {
      form.reset();
      toggleForm('student');
      statusBox.classList.add('hidden');
    }

    resetBtn.addEventListener('click', resetToStudentForm);

    async function uploadPhoto(file, folderName) {
      if (!file) return '#';

      const fileExt = file.name.split('.').pop();
      const fileName = `${folderName}/${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`;

      const { error: uploadError } = await supabaseClient.storage
        .from(PHOTO_BUCKET)
        .upload(fileName, file);

      if (uploadError) {
        console.error('Upload Error:', uploadError);
        throw uploadError;
      }

      const { data } = supabaseClient.storage.from(PHOTO_BUCKET).getPublicUrl(fileName);
      return data.publicUrl;
    }

    async function saveStudent() {
      const studentPhotoFile = document.getElementById('studentPhoto').files[0];
      const photoUrl = await uploadPhoto(studentPhotoFile, 'students');

      const studentData = {
        'Student Roll': document.getElementById('studentRoll').value.trim(),
        'Full Name': document.getElementById('studentName').value.trim(),
        'Gender': getSelectedRadioValue('studentGender'),
        'Department': document.getElementById('studentDepartment').value,
        'Semester': document.getElementById('studentSemester').value,
        'Shift': document.getElementById('studentShift').value,
        'Session': document.getElementById('studentSession').value,
        'Phone Number': document.getElementById('studentPhone').value.trim(),
        'Email': document.getElementById('studentEmail').value.trim(),
        'Address': document.getElementById('studentAddress').value.trim(),
        'Blood Group': document.getElementById('studentBlood').value,
        'Date Of Birth': document.getElementById('studentDob').value,
        'Guardian Name': document.getElementById('guardianName').value.trim(),
        'Guardian Phone': document.getElementById('guardianPhone').value.trim(),
        'Photo URL': photoUrl,
        'Facebook Link': document.getElementById('studentFacebook').value.trim() || null,
        'LinkedIn Link': document.getElementById('studentLinkedin').value.trim() || null
      };

      console.log('Student Data:', studentData);

      const { error } = await supabaseClient.from('students').insert([studentData]);
      if (error) {
        console.error('Student Insert Error:', error);
        throw error;
      }
    }

    async function saveTeacher() {
      const teacherPhotoFile = document.getElementById('teacherPhoto').files[0];
      const photoUrl = await uploadPhoto(teacherPhotoFile, 'teachers');

      const teacherData = {
        'Phone Number': document.getElementById('teacherPhone').value.trim(),
        'Name': document.getElementById('teacherName').value.trim(),
        'Position': document.getElementById('teacherPosition').value,
        'Gender': getSelectedRadioValue('teacherGender'),
        'Blood Group': document.getElementById('teacherBlood').value,
        'Shift': document.getElementById('teacherShift').value,
        'Address': document.getElementById('teacherAddress').value.trim(),
        'Photo URL': photoUrl,
        'Facebook Link': document.getElementById('teacherFacebook').value.trim() || null,
        'LinkedIn Link': document.getElementById('teacherLinkedin').value.trim() || null
      };

      console.log('Teacher Data:', teacherData);

      const { error } = await supabaseClient.from('teachers').insert([teacherData]);
      if (error) {
        console.error('Teacher Insert Error:', error);
        throw error;
      }
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const selectedType = document.querySelector('input[name="personType"]:checked').value;
      const isValid = form.reportValidity();

      if (!isValid) {
        showStatus('Please fill all required fields correctly.', 'error');
        return;
      }

      try {
        showStatus('Submitting form data...', '');

        if (selectedType === 'student') {
          await saveStudent();
          showStatus('Student information saved successfully.', 'success');
        } else {
          await saveTeacher();
          showStatus('Teacher information saved successfully.', 'success');
        }

        setTimeout(() => {
          resetToStudentForm();
        }, 1200);
      } catch (error) {
        console.error('Submit Error:', error);
        showStatus(error.message || 'Something went wrong while saving data.', 'error');
        alert(error.message || 'Something went wrong while saving data.');
      }
    });

    toggleForm('student');
  </script>
</body>
</html>
